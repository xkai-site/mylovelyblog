---
layout: default
---
<style>
  .post-wrapper { max-width: 800px; margin: 0 auto; padding: 2rem; }
  .post-header { margin-bottom: 2rem; border-bottom: 1px solid #eee; padding-bottom: 1rem; }
  .post-title { margin: 0 0 0.5rem 0; font-size: 1.75rem; }
  .post-date { color: #999; font-size: 0.9rem; margin: 0; }
  .post-content { line-height: 1.8; }
  .post-content p { margin: 1rem 0; }
  .back-link { color: #666; text-decoration: none; display: inline-block; margin-bottom: 1rem; }
  .back-link:hover { color: #333; }
</style>

<div class="post-wrapper">
  <a class="back-link" href="{{ site.baseurl }}/">← 返回首页</a>

  <article>
    <header class="post-header">
      <h1 class="post-title">{{ page.title }}</h1>
      <p class="post-date">{{ page.date | date: "%Y-%m-%d" }}</p>
    </header>
    <div class="post-content">
      {{ content }}
    </div>
  </article>
</div>

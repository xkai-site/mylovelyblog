---
layout: default
---
<style>
  .post-container { max-width: 800px; margin: 0 auto; padding: 2rem; }
  .post-header { margin-bottom: 2rem; }
  .post-title { font-size: 2rem; margin-bottom: 0.5rem; }
  .post-meta { color: #666; font-size: 0.9rem; }
  .post-content { line-height: 1.8; }
  .post-content h2 { margin-top: 2rem; }
  .back-link { 
    display: inline-block; 
    margin-bottom: 1rem; 
    color: #4f46e5; 
    text-decoration: none;
  }
  .back-link:hover { text-decoration: underline; }
  .back-link:focus-visible {
    outline: 2px solid #4f46e5;
    outline-offset: 2px;
  }
</style>

<div class="post-container">
  <a href="{{ site.baseurl }}/" class="back-link">← 返回首页</a>
  
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">📅 {{ page.date | date: "%Y年%m月%d日" }}</p>
  </header>
  
  <div class="post-content">
    {{ content }}
  </div>
</div>

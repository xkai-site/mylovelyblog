---
layout: default
title: 我的博客
---

<style>
  section { max-width: 640px !important; margin: 0 auto !important; padding: 3rem 2rem !important; }
  h1 { text-align: center !important; margin-bottom: 0.5rem !important; font-size: 2rem !important; }
  section > p { text-align: center !important; color: #666 !important; margin-bottom: 3rem !important; }
  h2 { margin-bottom: 1.5rem !important; font-size: 1.25rem !important; }
  .posts-list { list-style: none !important; padding: 0 !important; margin: 0 !important; }
  .posts-list li { 
    padding: 1rem 0 !important; 
    border-bottom: 1px solid #eee !important;
    display: flex !important;
    justify-content: space-between !important;
    align-items: baseline !important;
  }
  .posts-list li:last-child { border-bottom: none !important; }
  .post-title { color: #333 !important; text-decoration: none !important; }
  .post-title:hover { color: #666 !important; }
  .post-date { color: #999 !important; font-size: 0.9rem !important; }
</style>

<h1>欢迎你来!</h1>
<p>小xu的成长日志~希望有技术,有生活</p>

<h2>最新文章</h2>

<ul class="posts-list">
  {% for post in site.posts %}
  <li>
    <a class="post-title" href="{{ post.url | relative_url }}">{{ post.title }}</a>
    <span class="post-date">{{ post.date | date: "%Y-%m-%d" }}</span>
  </li>
  {% else %}
  <li>暂无文章</li>
  {% endfor %}
</ul>
